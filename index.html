<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Parking</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<div class="container">

  <div class="header">
    <h1>Smart Parking Control Panel</h1>
    <p>Manage parking slots in real-time</p>
  </div>

  <p id="status"></p>

  <div class="card">
    <h3>Register</h3>
    <input id="regUser" placeholder="Username">
    <input id="regPass" type="password" placeholder="Password">
    <button onclick="registerUser()">Register</button>
  </div>

  <div class="card">
    <h3>Login</h3>
    <input id="logUser" placeholder="Username">
    <input id="logPass" type="password" placeholder="Password">
    <button onclick="loginUser()">Login</button>
  </div>

  <div class="card">
    <h3>Parking Slots</h3>
    <button onclick="getSlots()">Load Slots</button>
    <ul id="slots"></ul>
  </div>

  <div class="card" id="adminCard">
    <h3>Admin Dashboard</h3>
    <input id="addLocation" placeholder="New slot location">
    <button onclick="addSlot()">Add Slot</button>
    <input id="adminSlotId" type="number" placeholder="Slot ID">
    <button onclick="releaseSlot()">Release Slot</button>
    <button onclick="deleteSlot()">Delete Slot</button>
  </div>

</div>

<script>
let token = localStorage.getItem("smart_parking_token") || "";
let role = localStorage.getItem("smart_parking_role") || "";

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

function setAdminVisibility() {
  const card = document.getElementById("adminCard");
  card.style.display = role === "admin" ? "block" : "none";
}

function authHeaders() {
  const headers = {"Content-Type": "application/json"};
  if (token) headers["Authorization"] = token;
  return headers;
}

async function registerUser() {
  const res = await fetch("/auth/register", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("regUser").value,
      password: document.getElementById("regPass").value
    })
  });
  const data = await res.json();
  setStatus(data.message || "Registered");
}

async function loginUser() {
  const res = await fetch("/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("logUser").value,
      password: document.getElementById("logPass").value
    })
  });
  const data = await res.json();

  token = data.token || "";
  role = data.role || "";
  localStorage.setItem("smart_parking_token", token);
  localStorage.setItem("smart_parking_role", role);
  setAdminVisibility();

  if (token) {
    setStatus("Logged in successfully");
  } else {
    setStatus(data.message || "Login failed");
  }
}

function renderSlots(data) {
  let list = document.getElementById("slots");
  list.innerHTML = "";

  data.forEach(slot => {
    let li = document.createElement("li");

    li.innerHTML = `
      <strong>${slot.location}</strong> - ${slot.status}
      <button onclick="book(${slot.id})">Book</button>
    `;

    list.appendChild(li);
  });
}

async function getSlots() {
  const res = await fetch("/slots");
  const data = await res.json();
  renderSlots(data);
  setStatus("Slots loaded");
}

async function book(id) {
  const res = await fetch("/book", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({id})
  });
  const data = await res.json();
  setStatus(data.message || "Book request completed");
  getSlots();
}

async function addSlot() {
  const location = document.getElementById("addLocation").value;
  const res = await fetch("/add-slot", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({location})
  });
  const data = await res.json();
  setStatus(data.message || "Add slot completed");
  getSlots();
}

async function releaseSlot() {
  const id = Number(document.getElementById("adminSlotId").value);
  const res = await fetch("/release-slot", {
    method: "POST",
    headers: authHeaders(),
    body: JSON.stringify({id})
  });
  const data = await res.json();
  setStatus(data.message || "Release completed");
  getSlots();
}

async function deleteSlot() {
  const id = Number(document.getElementById("adminSlotId").value);
  const res = await fetch(`/slots/${id}`, {
    method: "DELETE",
    headers: authHeaders()
  });
  const data = await res.json();
  setStatus(data.message || "Delete completed");
  getSlots();
}

setAdminVisibility();
getSlots();
</script>

</body>
</html>
